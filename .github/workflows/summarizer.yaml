name: Code Summarizer
on:
  push:
permissions:
  contents: write
jobs:
  summarizer:
    runs-on: ubuntu-latest
    steps:
      - name: Get Repo
        uses: actions/checkout@v4

      - name: Get diff from repo
        run: |
          if git rev-parse HEAD~1 > /dev/null 2>&1; then
            git diff HEAD~1 HEAD > diff.txt
          else
            git diff --root HEAD > diff.txt
          fi

      - name: Call AI API to summarize diff
        run: |
          diff=$(cat diff.txt)
          payload=$(jq -n --arg diff "$diff" '{

              "model": "grok-4.3",
              "input": $diff,
              "instructions": "Take the following code from the output of the diff and generate a bulleted list that summarizes the differences based on chunks of code, title with the date" 
            }'
          )
          curl -s https://api.x.ai/v1/responses \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.GROK_API }}" \
            -d  "$payload" > response.txt

      - name: Modify changelog file
        run: jq -r '.output[0].content[0].text' response.txt >> CHANGELOG.md

      - name: Push the changelog file
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Chore: Updating the changelog"
          file_pattern: "CHANGELOG.md"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
